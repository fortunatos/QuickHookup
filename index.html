<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Age Verification</title>

  <!-- twitter card details -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:site" content="@CurvyMoms"/>
  <meta name="twitter:url" content="https://activemembers.site/"/>
  <meta name="twitter:title" content="My page is on free Right Now!!"/>
  <meta name="twitter:description" content="@"/>
  <meta name="twitter:image" content="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgpm-Nss3Tv9rTb8VpJtOW96EL7qYOgi80pcTYJ6eExVMy4BDFp004Rewjc2w8xJFb4D-e3Ov8kDRBrCQsH3UtUmRQGpbyu88QpeBY-Hi9-vCMSCSNRgXcqATpI4ITydQZ4tu_8PGJ7TalJ7pD_vpk031Uafg3B2wwRL6BvJRaMOAhO5g0uJ9CycuEI8yAy/s1568/1000169109.jpg"/>
  <!-- end twitter card details -->

  <script type="text/javascript">
    var hash = window.location.hash;

    if (hash.length > 0) {
      hash = hash.substring(1);

      var cleanHash = hash.replace(/[^a-zA-Z0-9\s]/g, '-');
      cleanHash = cleanHash.replace(/\s+/g, '-');

      document.title = 'ActiveMembers: ' + cleanHash;
    }
  </script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#0b0b0b;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      overflow:hidden;
      padding:20px;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left,#ff4d6720,transparent 30%),
      radial-gradient(circle at bottom right,#7c3aed20,transparent 30%),
      #0b0b0b;
      z-index:-1;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#121212;
      border:1px solid #262626;
      border-radius:24px;
      padding:40px 30px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }

    .icon{
      font-size:58px;
      margin-bottom:20px;
    }

    h1{
      font-size:2rem;
      margin-bottom:15px;
    }

    p{
      color:#b3b3b3;
      line-height:1.7;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .btn{
      text-decoration:none;
      padding:16px;
      border-radius:14px;
      font-weight:bold;
      transition:.25s ease;
    }

    .enter{
      background:linear-gradient(90deg,#ff4d67,#ff758c);
      color:white;
      box-shadow:0 10px 30px rgba(255,77,103,.25);
    }

    .enter:hover{
      transform:translateY(-2px);
    }

    .exit{
      background:#1d1d1d;
      border:1px solid #333;
      color:#ccc;
    }

    .footer{
      margin-top:25px;
      color:#666;
      font-size:.85rem;
    }

    @media(max-width:480px){

      h1{
        font-size:1.7rem;
      }

    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="icon">
    🔞
  </div>

  <h1>Age Verification</h1>

  <p>
    You must be 18 years or older to access this website.
    Please confirm your age before continuing.
  </p>

  <div class="buttons">

    <a href="go.html" class="btn enter">
      I Am 18+ Continue
    </a>

    <a href="go.html" class="btn exit">
      Exit
    </a>

  </div>

  <div class="footer">
    By continuing, you confirm that you meet the legal age requirements.
  </div>

</div>

</body>
</html>
